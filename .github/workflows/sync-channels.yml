# 通道同步工作流程 / Channel Sync Workflow
# 此工作流程自動同步主分支與開發通道之間的變更
# This workflow automatically syncs changes between master and development channels
# 使用直通原理 - 任何分支的變更會自動同步到其他通道
# Using direct-through principle - changes to any branch auto-sync to other channels

name: Channel Sync / 通道同步

on:
  # 自動觸發：當任何通道有推送時 / Auto-trigger on push to any channel
  push:
    branches:
      - master
      - main
      - dev
      - release
  # 手動觸發選項 / Manual trigger option
  workflow_dispatch:
    inputs:
      sync_direction:
        description: '同步方向 / Sync Direction'
        required: true
        default: 'full-sync'
        type: choice
        options:
          - full-sync
          - master-to-dev
          - dev-to-master
          - master-to-release

permissions:
  contents: write
  pull-requests: write

# 防止同時運行多個同步 / Prevent concurrent syncs
concurrency:
  group: channel-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 初始化通道 / Initialize channels
  init-channels:
    name: Initialize Channels / 初始化通道
    runs-on: ubuntu-latest
    outputs:
      default_branch: ${{ steps.detect-branch.outputs.default_branch }}
      dev_exists: ${{ steps.check-branches.outputs.dev_exists }}
      release_exists: ${{ steps.check-branches.outputs.release_exists }}
      triggered_by: ${{ steps.detect-trigger.outputs.triggered_by }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Default Branch
        id: detect-branch
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          if [ -z "$DEFAULT_BRANCH" ]; then
            if git show-ref --verify --quiet refs/remotes/origin/main; then
              DEFAULT_BRANCH="main"
            elif git show-ref --verify --quiet refs/remotes/origin/master; then
              DEFAULT_BRANCH="master"
            fi
          fi
          if [ -z "$DEFAULT_BRANCH" ]; then
            DEFAULT_BRANCH=$(git remote show origin 2>/dev/null | sed -n '/HEAD branch/s/.*: //p' || true)
          fi
          if [ -z "$DEFAULT_BRANCH" ]; then
            DEFAULT_BRANCH="master"
          fi
          echo "default_branch=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT
          echo "Detected default branch: $DEFAULT_BRANCH"

      - name: Check Existing Branches
        id: check-branches
        run: |
          if git ls-remote --exit-code --heads origin dev >/dev/null 2>&1; then
            echo "dev_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dev_exists=false" >> $GITHUB_OUTPUT
          fi
          
          if git ls-remote --exit-code --heads origin release >/dev/null 2>&1; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect Trigger Source
        id: detect-trigger
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "triggered_by=manual" >> $GITHUB_OUTPUT
          else
            BRANCH="${{ github.ref_name }}"
            echo "triggered_by=$BRANCH" >> $GITHUB_OUTPUT
          fi

  # 直通同步 / Direct-through sync
  direct-sync:
    name: Direct-Through Sync / 直通同步
    runs-on: ubuntu-latest
    needs: init-channels
    # 跳過如果是由同步機器人觸發的 / Skip if triggered by sync bot
    if: github.actor != 'github-actions[bot]'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Dev Channel (if needed)
        if: needs.init-channels.outputs.dev_exists == 'false'
        run: |
          DEFAULT_BRANCH="${{ needs.init-channels.outputs.default_branch }}"
          echo "🔧 Creating dev channel from $DEFAULT_BRANCH..."
          git checkout -b dev "origin/$DEFAULT_BRANCH"
          git push -u origin dev
          echo "✅ Created dev channel"

      - name: Create Release Channel (if needed)
        if: needs.init-channels.outputs.release_exists == 'false'
        run: |
          DEFAULT_BRANCH="${{ needs.init-channels.outputs.default_branch }}"
          echo "🔧 Creating release channel from $DEFAULT_BRANCH..."
          git checkout -b release "origin/$DEFAULT_BRANCH"
          git push -u origin release
          echo "✅ Created release channel"

      # 直通同步：master → dev / Direct-through: master → dev
      - name: Sync Master → Dev (Direct-Through)
        if: |
          (needs.init-channels.outputs.triggered_by == 'master' || 
           needs.init-channels.outputs.triggered_by == 'main' ||
           github.event.inputs.sync_direction == 'full-sync' ||
           github.event.inputs.sync_direction == 'master-to-dev')
        run: |
          DEFAULT_BRANCH="${{ needs.init-channels.outputs.default_branch }}"
          echo "🔄 直通同步 / Direct-through sync: $DEFAULT_BRANCH → dev"
          
          git fetch origin
          
          # 檢查 dev 分支是否存在 / Check if dev branch exists
          if git ls-remote --exit-code --heads origin dev >/dev/null 2>&1; then
            git checkout dev
            git pull origin dev --rebase=false || true
          else
            echo "Creating dev branch from $DEFAULT_BRANCH"
            git checkout -b dev "origin/$DEFAULT_BRANCH"
          fi
          
          # 使用 fast-forward 合併實現直通 / Use fast-forward merge for direct-through
          if git merge "origin/$DEFAULT_BRANCH" --ff-only 2>/dev/null; then
            echo "✅ Fast-forward merge successful"
            git push origin dev
          elif git merge "origin/$DEFAULT_BRANCH" --no-edit; then
            echo "✅ Merge successful"
            git push origin dev
          else
            echo "⚠️ Merge conflict detected, skipping auto-sync"
            echo "Please resolve conflicts manually or create a PR"
            git merge --abort || true
          fi

      # 直通同步：dev → master / Direct-through: dev → master
      - name: Sync Dev → Master (Direct-Through)
        if: |
          needs.init-channels.outputs.triggered_by == 'dev' ||
          github.event.inputs.sync_direction == 'full-sync' ||
          github.event.inputs.sync_direction == 'dev-to-master'
        run: |
          DEFAULT_BRANCH="${{ needs.init-channels.outputs.default_branch }}"
          echo "🔄 直通同步 / Direct-through sync: dev → $DEFAULT_BRANCH"
          
          git fetch origin
          
          # 檢查 dev 分支是否存在 / Check if dev branch exists
          if ! git ls-remote --exit-code --heads origin dev >/dev/null 2>&1; then
            echo "⚠️ Dev branch does not exist, skipping sync"
            exit 0
          fi
          
          git checkout "$DEFAULT_BRANCH"
          git pull origin "$DEFAULT_BRANCH" --rebase=false || true
          
          # 使用 fast-forward 合併實現直通 / Use fast-forward merge for direct-through
          if git merge origin/dev --ff-only 2>/dev/null; then
            echo "✅ Fast-forward merge successful"
            git push origin "$DEFAULT_BRANCH"
          elif git merge origin/dev --no-edit; then
            echo "✅ Merge successful"
            git push origin "$DEFAULT_BRANCH"
          else
            echo "⚠️ Merge conflict detected, skipping auto-sync"
            echo "Please resolve conflicts manually or create a PR"
            git merge --abort || true
          fi

      # 直通同步：master → release / Direct-through: master → release
      - name: Sync Master → Release (Direct-Through)
        if: |
          (needs.init-channels.outputs.triggered_by == 'master' || 
           needs.init-channels.outputs.triggered_by == 'main' ||
           github.event.inputs.sync_direction == 'full-sync' ||
           github.event.inputs.sync_direction == 'master-to-release')
        run: |
          DEFAULT_BRANCH="${{ needs.init-channels.outputs.default_branch }}"
          echo "🔄 直通同步 / Direct-through sync: $DEFAULT_BRANCH → release"
          
          git fetch origin
          
          # 檢查 release 分支是否存在 / Check if release branch exists
          if git ls-remote --exit-code --heads origin release >/dev/null 2>&1; then
            git checkout release
            git pull origin release --rebase=false || true
          else
            echo "Creating release branch from $DEFAULT_BRANCH"
            git checkout -b release "origin/$DEFAULT_BRANCH"
          fi
          
          # 使用 fast-forward 合併實現直通 / Use fast-forward merge for direct-through
          if git merge "origin/$DEFAULT_BRANCH" --ff-only 2>/dev/null; then
            echo "✅ Fast-forward merge successful"
            git push origin release
          elif git merge "origin/$DEFAULT_BRANCH" --no-edit; then
            echo "✅ Merge successful"
            git push origin release
          else
            echo "⚠️ Merge conflict detected, skipping auto-sync"
            echo "Please resolve conflicts manually or create a PR"
            git merge --abort || true
          fi

      - name: Sync Summary
        run: |
          echo "## 🔄 直通同步摘要 / Direct-Through Sync Summary"
          echo ""
          echo "### 觸發來源 / Triggered By: ${{ needs.init-channels.outputs.triggered_by }}"
          echo ""
          echo "### 通道架構 / Channel Architecture:"
          echo '```'
          echo "┌─────────────────────────────────────────────┐"
          echo "│     直通同步系統 / Direct-Through Sync      │"
          echo "├─────────────────────────────────────────────┤"
          echo "│                                             │"
          echo "│   master ←──直通──→ dev                    │"
          echo "│     │                                       │"
          echo "│     └──直通──→ release                     │"
          echo "│                                             │"
          echo "└─────────────────────────────────────────────┘"
          echo '```'
          echo ""
          echo "同步完成於 / Sync completed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

  notify-sync:
    name: Notify Sync Status
    runs-on: ubuntu-latest
    needs: [init-channels, direct-sync]
    if: always()
    
    steps:
      - name: Report Sync Status
        run: |
          if [ "${{ needs.direct-sync.result }}" == "success" ]; then
            echo "✅ 直通同步成功完成 / Direct-through sync completed successfully"
          elif [ "${{ needs.direct-sync.result }}" == "skipped" ]; then
            echo "⏭️ 同步已跳過 (由機器人觸發) / Sync skipped (triggered by bot)"
          else
            echo "❌ 直通同步失敗 / Direct-through sync failed"
          fi
